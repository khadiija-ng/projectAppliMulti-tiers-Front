<div class="container">
    <h2 class="heading">Ajout d'un etablissement</h2>
    <form [formGroup]="etablissementForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
        <label for="name">Nom</label>
        <input type="text" class="form-control" id="libelle" formControlName="libelle" autocomplete="off">
        <div *ngIf="etablissementForm?.get('libelle')?.invalid && etablissementForm?.get('libelle')?.touched" class="text-danger" >
          Name is required.
        </div>
      </div>
  
      <div class="form-group">
        <label for="sigle">Sigle</label>
        <input type="text" class="form-control" id="sigle" formControlName="sigle" autocomplete="off">
        <div *ngIf="etablissementForm?.get('sigle')?.invalid && etablissementForm?.get('sigle')?.touched" class="text-danger">
          Please enter a valid sigle.
        </div>
      </div>
  
      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" class="form-control" id="address" formControlName="address" autocomplete="off">
        <div *ngIf="etablissementForm?.get('address')?.invalid && etablissementForm?.get('address')?.touched" class="text-danger">
          Address is required.
        </div>
      </div>
  
      <div class="form-group">
        <label for="logo">logo</label>
        <input type="text" class="form-control" id="logo" formControlName="logo" autocomplete="off">
        <div *ngIf="etablissementForm?.get('logo')?.invalid && etablissementForm?.get('logo')?.touched" class="text-danger">
          Please enter a valid logo .
        </div>
      </div>
  
      
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>
